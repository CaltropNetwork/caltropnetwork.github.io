<!DOCTYPE index.html>

<html>
<link rel="stylesheet" href="https://matcha.mizu.sh/matcha.css">  

<body>

<h1>Map List</h1>

    <script>
      (async () => {
        const response = await fetch('https://api.github.com/repos/CaltropNetwork/caltropnetwork.github.io/contents/pf2/maps');
        const data = await response.json();
        let htmlString = '<ul>';
        
        for (let file of data) {
          htmlString += `<li><a href="https://caltropnetwork.github.io/${file.path}">${file.name}</a></li>`;
        }

        htmlString += '</ul>';
        document.getElementById("list").innerHTML = htmlString;
      })()
    </script>

   <div id="list"></div>
  <body>
</html>
